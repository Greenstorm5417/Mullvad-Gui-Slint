name: Mullvad daemon compatibility

on:
  schedule:
    - cron: '17 4 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: daemon-compatibility-${{ github.ref }}
  cancel-in-progress: true

jobs:
  daemon-rpc:
    name: Latest ${{ matrix.channel }} daemon
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        channel: [stable, beta]
    steps:
      - uses: actions/checkout@v7
      - name: Build isolated daemon-test image
        run: docker build --file docker/daemon-test.Dockerfile --tag mullvad-gui-slint-daemon-test .
      - name: Install and test the latest official daemon
        run: |
          docker run --rm --privileged \
            --env MULLVAD_CHANNEL='${{ matrix.channel }}' \
            --volume "$PWD:/workspace" \
            mullvad-gui-slint-daemon-test ./scripts/ci/test-latest-daemon.sh
