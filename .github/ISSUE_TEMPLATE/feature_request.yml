name: Feature request
description: Suggest a Mullvad-Gui-Slint feature or compatibility improvement
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: use-case
    attributes:
      label: Use case
      description: Describe the workflow or compatibility gap this would address.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
    validations:
      required: true
